apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "intelowl.fullname" . }}-celery-worker-default
  labels:
    {{- include "intelowl.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-worker-default
  {{- if .Values.postgresql.operator.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  {{- end }}
spec:
  {{- if not .Values.celeryWorkerDefault.autoscaling.enabled }}
  replicas: {{ .Values.celeryWorkerDefault.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "intelowl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: celery-worker-default
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secrets/app-secrets.yaml") . | sha256sum }}
        {{- if .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "9808"
        prometheus.io/path: "/metrics"
        {{- end }}
      labels:
        {{- include "intelowl.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: celery-worker-default
    spec:
      {{- include "intelowl.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "intelowl.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.celeryWorkerDefault.terminationGracePeriodSeconds }}
      initContainers:
        {{- include "intelowl.waitForDbInitContainer" . | nindent 8 }}
        {{- include "intelowl.waitForRedisInitContainer" . | nindent 8 }}
        {{- include "intelowl.waitForUwsgiInitContainer" . | nindent 8 }}
        {{- if .Values.storage.localStorage }}
        {{- include "intelowl.initDirectoriesContainer" . | nindent 8 }}
        {{- end }}
      containers:
        - name: celery-worker
          image: {{ include "intelowl.image" (dict "imageRoot" .Values.celeryWorkerDefault.image "Chart" .Chart "Values" .Values) }}
          imagePullPolicy: {{ .Values.celeryWorkerDefault.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command:
            - celery
            - -A
            - intel_owl.celery
            - worker
            - --loglevel={{ .Values.app.logLevel }}
            - --concurrency={{ .Values.celeryWorkerDefault.concurrency }}
            - -Q
            - default
            - --without-heartbeat
            - --without-gossip
            - --without-mingle
          env:
            {{- include "intelowl.commonEnvVars" . | nindent 12 }}
            {{- with .Values.celeryWorkerDefault.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- include "intelowl.commonVolumeMounts" . | nindent 12 }}
            {{- with .Values.celeryWorkerDefault.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - celery -A intel_owl.celery inspect ping -d celery@$HOSTNAME
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.celeryWorkerDefault.resources | nindent 12 }}
      volumes:
        {{- include "intelowl.commonVolumes" . | nindent 8 }}
        {{- with .Values.celeryWorkerDefault.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.celeryWorkerDefault.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.celeryWorkerDefault.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.celeryWorkerDefault.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
