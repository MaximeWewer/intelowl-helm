{{- if .Values.integrations.phoneinfoga.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "intelowl.fullname" . }}-phoneinfoga
  labels:
    {{- include "intelowl.labels" . | nindent 4 }}
    app.kubernetes.io/component: phoneinfoga
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "intelowl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: phoneinfoga
  template:
    metadata:
      labels:
        {{- include "intelowl.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: phoneinfoga
    spec:
      {{- include "intelowl.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "intelowl.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
      containers:
        - name: phoneinfoga
          image: "{{ .Values.integrations.phoneinfoga.image.repository }}:{{ .Values.integrations.phoneinfoga.image.tag }}"
          imagePullPolicy: {{ .Values.integrations.phoneinfoga.image.pullPolicy }}
          args:
            - serve
            - --no-client
          ports:
            - name: http
              containerPort: {{ .Values.integrations.phoneinfoga.service.port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.integrations.phoneinfoga.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "intelowl.fullname" . }}-phoneinfoga
  labels:
    {{- include "intelowl.labels" . | nindent 4 }}
    app.kubernetes.io/component: phoneinfoga
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.integrations.phoneinfoga.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "intelowl.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: phoneinfoga
{{- end }}
