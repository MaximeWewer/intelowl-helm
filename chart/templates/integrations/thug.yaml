{{- if .Values.integrations.thug.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "intelowl.fullname" . }}-thug
  labels:
    {{- include "intelowl.labels" . | nindent 4 }}
    app.kubernetes.io/component: thug
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "intelowl.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: thug
  template:
    metadata:
      labels:
        {{- include "intelowl.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: thug
    spec:
      {{- include "intelowl.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "intelowl.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
      containers:
        - name: thug
          image: "{{ .Values.integrations.thug.image.repository }}:{{ .Values.integrations.thug.image.tag | default .Values.app.version }}"
          imagePullPolicy: {{ .Values.integrations.thug.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.integrations.thug.service.port }}
              protocol: TCP
          env:
            {{- include "intelowl.commonEnvVars" . | nindent 12 }}
          volumeMounts:
            {{- include "intelowl.commonVolumeMounts" . | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.integrations.thug.resources | nindent 12 }}
      volumes:
        {{- include "intelowl.commonVolumes" . | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "intelowl.fullname" . }}-thug
  labels:
    {{- include "intelowl.labels" . | nindent 4 }}
    app.kubernetes.io/component: thug
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.integrations.thug.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "intelowl.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: thug
{{- end }}
