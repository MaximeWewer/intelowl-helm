{{- if and .Values.postgresql.enabled .Values.database.internal }}
{{- if not .Values.postgresql.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "intelowl.fullname" . }}-postgres-credentials
  labels:
    {{- include "intelowl.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
    cnpg.io/reload: "true"
  {{- if .Values.migration.enabled }}
  annotations:
    {{- include "intelowl.installOrder" (dict "ctx" . "wave" "0" "weight" "-11") | nindent 4 }}
  {{- end }}
type: kubernetes.io/basic-auth
data:
  {{- $secretName := printf "%s-postgres-credentials" (include "intelowl.fullname" .) }}
  {{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
  {{- if and $existingSecret $existingSecret.data }}
  # Reuse existing password to avoid regeneration on upgrades
  username: {{ $existingSecret.data.username }}
  password: {{ $existingSecret.data.password }}
  {{- else }}
  # Generate new credentials
  username: {{ .Values.postgresql.username | default "intelowl" | b64enc | quote }}
  {{- if .Values.postgresql.password }}
  password: {{ .Values.postgresql.password | b64enc | quote }}
  {{- else }}
  password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
