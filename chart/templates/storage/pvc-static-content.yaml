{{- if .Values.storage.localStorage }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "intelowl.fullname" . }}-static-content
  labels:
    {{- include "intelowl.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
  {{- if .Values.migration.enabled }}
  annotations:
    {{- include "intelowl.installOrder" (dict "ctx" . "wave" "0" "weight" "-15" "keep" true) | nindent 4 }}
    "helm.sh/resource-policy": keep
  {{- end }}
spec:
  accessModes:
    {{- range .Values.storage.staticContent.accessModes }}
    - {{ . }}
    {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.staticContent.size }}
  {{- include "intelowl.storageClass" (dict "storageClass" .Values.storage.staticContent.storageClass "Values" .Values) | nindent 2 }}
{{- end }}
