{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "intelowl.serviceAccountName" . }}
  labels:
    {{- include "intelowl.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.migration.enabled }}
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    {{- end }}
    {{- with .Values.rbac.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
