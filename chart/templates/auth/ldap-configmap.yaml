{{- if .Values.auth.ldap.enabled }}
{{- if not .Values.auth.ldap.existingConfigMap }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "intelowl.fullname" . }}-ldap-config
  labels:
    {{- include "intelowl.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth-ldap
data:
  ldap_config.py: |-
{{ .Values.auth.ldap.config | indent 4 }}
{{- end }}
{{- end }}
