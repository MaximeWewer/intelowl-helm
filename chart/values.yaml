    # -- NodePort port number (only used when type is NodePort)
    nodePort:

  startupProbe:
    # -- Enable startup probe
    enabled: true
    # -- Initial delay seconds
    initialDelaySeconds: 5
    # -- Period seconds
    periodSeconds: 5
    # -- Timeout seconds
    timeoutSeconds: 3
    # -- Failure threshold
    failureThreshold: 12
    # -- Success threshold
    successThreshold: 1

  livenessProbe:
    # -- Enable liveness probe
    enabled: true
    # -- Initial delay seconds
    initialDelaySeconds: 10
    # -- Period seconds
    periodSeconds: 10
    # -- Timeout seconds
    timeoutSeconds: 5
    # -- Failure threshold
    failureThreshold: 6
    # -- Success threshold
    successThreshold: 1

  readinessProbe:
    # -- Enable readiness probe
    enabled: true
    # -- Initial delay seconds
    initialDelaySeconds: 5
    # -- Period seconds
    periodSeconds: 10
    # -- Timeout seconds
    timeoutSeconds: 5
    # -- Failure threshold
    failureThreshold: 6
    # -- Success threshold
    successThreshold: 1

# @section Celery Beat parameters
# Task scheduler (always runs as single instance)

celeryBeat:
  image:
    # -- Celery Beat image repository
    repository: intelowlproject/intelowl
    # -- Celery Beat image tag (defaults to app.version)
    tag: ""
    # -- Celery Beat image pull policy
    pullPolicy: IfNotPresent

  resources:
    requests:
      # -- Memory request for Celery Beat
      memory: "256Mi"
      # -- CPU request for Celery Beat
      cpu: "100m"
    limits:
      # -- Memory limit for Celery Beat
      memory: "512Mi"
      # -- CPU limit for Celery Beat
      cpu: "250m"

  # -- Node selector for Celery Beat pod
  nodeSelector: {}
  # -- Tolerations for Celery Beat pod
  tolerations: []
  # -- Affinity rules for Celery Beat pod
  affinity: {}
  # -- Additional environment variables for Celery Beat
  extraEnvVars: []
  # -- Additional volume mounts for Celery Beat
  extraVolumeMounts: []
  # -- Additional volumes for Celery Beat
  extraVolumes: []

# @section Celery Worker parameters
# Default queue worker configuration

celeryWorkerDefault:
  # -- Number of Celery Worker replicas
  replicaCount: 2
  # -- Celery concurrency (number of worker processes per pod)
  concurrency: 4
  # -- Termination grace period in seconds (allow tasks to complete)
  terminationGracePeriodSeconds: 180

  image:
    # -- Celery Worker image repository
    repository: intelowlproject/intelowl
    # -- Celery Worker image tag (defaults to app.version)
    tag: ""
    # -- Celery Worker image pull policy
    pullPolicy: IfNotPresent

  resources:
    requests:
      # -- Memory request for Celery Worker
      memory: "1Gi"
      # -- CPU request for Celery Worker
      cpu: "500m"
    limits:
      # -- Memory limit for Celery Worker
      memory: "4Gi"
      # -- CPU limit for Celery Worker
      cpu: "2"

  autoscaling:
    # -- Enable Horizontal Pod Autoscaler for Celery Worker
    enabled: false
    # -- Minimum number of replicas
    minReplicas: 2
    # -- Maximum number of replicas
    maxReplicas: 10
    # -- Target CPU utilization percentage
    targetCPUUtilizationPercentage: 80
    # -- Target memory utilization percentage
    targetMemoryUtilizationPercentage: 80

  pdb:
    # -- Enable Pod Disruption Budget for Celery Worker
    enabled: true
    # -- Minimum available pods
    minAvailable: 1

  # -- Node selector for Celery Worker pods
  nodeSelector: {}
  # -- Tolerations for Celery Worker pods
  tolerations: []
  # -- Affinity rules for Celery Worker pods
  affinity: {}
  # -- Additional environment variables for Celery Worker
  extraEnvVars: []
  # -- Additional volume mounts for Celery Worker
  extraVolumeMounts: []
  # -- Additional volumes for Celery Worker
  extraVolumes: []

# @section Multi-queue workers parameters
# Optional specialized workers for different task types

multiQueue:
  # -- Enable multi-queue workers for better resource isolation
  enabled: false

  # Local queue worker (fast, local-only tasks)
  workerLocal:
    # -- Enable local queue worker
    enabled: true
    # -- Number of replicas
    replicaCount: 1
    # -- Worker concurrency
    concurrency: 2
    # -- Termination grace period
    terminationGracePeriodSeconds: 180
    resources:
      requests:
        # -- Memory request
        memory: "512Mi"
        # -- CPU request
        cpu: "250m"
      limits:
        # -- Memory limit
        memory: "2Gi"
        # -- CPU limit
        cpu: "1"
    # -- Node selector
    nodeSelector: {}
    # -- Tolerations
    tolerations: []
    # -- Affinity rules
    affinity: {}

  # Long-running tasks worker
  workerLong:
    # -- Enable long-running tasks worker
    enabled: true
    # -- Number of replicas
    replicaCount: 1
    # -- Worker concurrency
    concurrency: 2
    # -- Termination grace period (longer for long tasks)
    terminationGracePeriodSeconds: 600
    resources:
      requests:
        # -- Memory request
        memory: "1Gi"
        # -- CPU request
        cpu: "500m"
      limits:
        # -- Memory limit
        memory: "4Gi"
        # -- CPU limit
        cpu: "2"
    # -- Node selector
    nodeSelector: {}
    # -- Tolerations
    tolerations: []
    # -- Affinity rules
    affinity: {}

  # Ingestor worker (data ingestion tasks)
  workerIngestor:
    # -- Enable ingestor worker
    enabled: true
    # -- Number of replicas
    replicaCount: 1
    # -- Worker concurrency
    concurrency: 2
    # -- Termination grace period
    terminationGracePeriodSeconds: 180
    resources:
      requests:
        # -- Memory request
        memory: "512Mi"
        # -- CPU request
        cpu: "250m"
      limits:
        # -- Memory limit
        memory: "2Gi"
        # -- CPU limit
        cpu: "1"
    # -- Node selector
    nodeSelector: {}
    # -- Tolerations
    tolerations: []
    # -- Affinity rules
    affinity: {}

# @section Flower parameters
# Celery monitoring dashboard

flower:
  # -- Enable Flower dashboard
  enabled: false
  # -- Number of Flower replicas
  replicaCount: 1

  image:
    # -- Flower image repository
    repository: mher/flower
    # -- Flower image tag
    tag: "2.0"
    # -- Flower image pull policy
    pullPolicy: IfNotPresent

  resources:
    requests:
      # -- Memory request for Flower
      memory: "256Mi"
      # -- CPU request for Flower
      cpu: "100m"
    limits:
      # -- Memory limit for Flower
      memory: "512Mi"
      # -- CPU limit for Flower
      cpu: "500m"

  # Basic authentication for Flower dashboard
  auth:
    # -- Enable basic authentication
    enabled: true
    # -- Username for basic auth
    username: "admin"
    # -- Password for basic auth (auto-generated if empty)
    password: ""
    # -- Use existing secret for password (key: flower-password)
    existingSecret: ""

  # -- Node selector for Flower pod
  nodeSelector: {}
  # -- Tolerations for Flower pod
  tolerations: []
  # -- Affinity rules for Flower pod
  affinity: {}

  service:
    # -- Flower service type
    type: ClusterIP
    # -- Flower service port
    port: 5555
    # -- NodePort port number (only used when type is NodePort)
    nodePort:

  # Ingress for Flower dashboard
  ingress:
    # -- Enable Ingress for Flower
    enabled: false
    # -- Ingress class name
    className: ""
    # -- Ingress annotations
    annotations: {}
    # -- Ingress hosts
    hosts:
      - host: flower.intelowl.local
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration
    tls: []

# @section Integrations parameters
# Optional Docker-based analyzers

integrations:
  # CyberChef integration (recipe-based data transformation)
  cyberchef:
    # -- Enable CyberChef integration
    enabled: false
    image:
      # -- CyberChef image repository
      repository: intelowlproject/intelowl_cyberchef
      # -- CyberChef image tag (defaults to app.version)
      tag: ""
      # -- Image pull policy
      pullPolicy: IfNotPresent
    service:
      # -- Service port
      port: 3000
    resources:
      requests:
        # -- Memory request
        memory: "256Mi"
        # -- CPU request
        cpu: "100m"
      limits:
        # -- Memory limit
        memory: "512Mi"
        # -- CPU limit
        cpu: "500m"

  # Malware Tools integration (ClamAV, Qiling, etc.)
  malwareTools:
    # -- Enable Malware Tools integration
    enabled: false
    image:
      # -- Malware Tools image repository
      repository: intelowlproject/intelowl_malware_tools_analyzers
      # -- Image tag (defaults to app.version)
      tag: ""
      # -- Image pull policy
      pullPolicy: IfNotPresent
    service:
      # -- Service port
      port: 4002
    resources:
      requests:
        # -- Memory request
        memory: "512Mi"
        # -- CPU request
        cpu: "250m"
      limits:
        # -- Memory limit
        memory: "2Gi"
        # -- CPU limit
        cpu: "1"

  # Nuclei integration (vulnerability scanner)
  nuclei:
    # -- Enable Nuclei integration
    enabled: false
    image:
      # -- Nuclei image repository
      repository: intelowlproject/intelowl_nuclei_analyzer
      # -- Image tag (defaults to app.version)
      tag: ""
