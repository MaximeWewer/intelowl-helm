      repository: intelowlproject/phunter
      # -- Image tag (defaults to app.version)
      tag: ""
      # -- Image pull policy
      pullPolicy: IfNotPresent
    service:
      # -- Service port
      port: 5612
    resources:
      requests:
        # -- Memory request
        memory: "256Mi"
        # -- CPU request
        cpu: "100m"
      limits:
        # -- Memory limit
        memory: "512Mi"
        # -- CPU limit
        cpu: "500m"

  # Thug integration (low-interaction honeyclient)
  thug:
    # -- Enable Thug integration
    enabled: false
    image:
      # -- Thug image repository
      repository: intelowlproject/intelowl_thug
      # -- Image tag (defaults to app.version)
      tag: ""
      # -- Image pull policy
      pullPolicy: IfNotPresent
