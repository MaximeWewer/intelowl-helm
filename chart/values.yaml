# IntelOwl Helm Chart Values
# Full documentation: https://intelowl.readthedocs.io/
# To update README.md : `cd helm && helm-docs`

# @section Global parameters

global:
  # -- Global Docker image registry
  imageRegistry: ""
  # -- Global Docker registry secret names as an array
  imagePullSecrets: []
  # -- Global StorageClass for Persistent Volume(s)
  storageClass: ""

# @section Common parameters

# -- String to partially override intelowl.fullname
nameOverride: ""
# -- String to fully override intelowl.fullname
fullnameOverride: ""

# @section Application parameters

app:
  # -- IntelOwl application version
  version: "v6.6.1"

  django:
    # -- Django secret key (required). Generate with: python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())"
    secretKey: ""
    # -- Use existing secret for Django secret key (key: django-secret)
    existingSecret: ""
    # -- Enable Django debug mode (never enable in production)
    debug: false
    # -- Django allowed hosts (comma-separated)
    allowedHosts: "*"

  # -- Base URL for the application (used for CORS and absolute URLs)
  baseUrl: ""
  # -- Default timeout for analyzers in seconds
  defaultTimeout: 300
  # -- Log level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
  logLevel: "INFO"
  # -- Number of days to retain old jobs (set to 0 to disable)
  oldJobsRetentionDays: 14
  # -- Enable HTTPS security headers (set to true when TLS is terminated at ingress/gateway)
  httpsEnabled: false

  # Slack notification configuration
  slack:
    # -- Enable Slack notifications
    enabled: false
    # -- Slack API token
    token: ""
    # -- Default Slack channel for notifications
    defaultChannel: ""
    # -- Use existing secret for Slack token (key: slack-token)
    existingSecret: ""

  # Email/SMTP configuration
  email:
    # -- Enable email notifications
    enabled: false
    # -- Default sender email address
    defaultFromEmail: ""
    # -- Default recipient email address
    defaultEmail: ""
    # -- SMTP server host
    host: ""
    # -- SMTP server port
    port: 587
    # -- SMTP username
    hostUser: ""
    # -- SMTP password
    hostPassword: ""
    # -- Use TLS for SMTP
    useTls: true
    # -- Use SSL for SMTP
    useSsl: false
    # -- Use existing secret for SMTP password (key: email-password)
    existingSecret: ""

# @section Database parameters

database:
  # -- Use internal PostgreSQL (CloudNative-PG) subchart
  internal: true

  # External database configuration (used when internal is false)
  external:
    # -- External database host
    host: ""
    # -- External database port
    port: 5432
    # -- External database name
    name: "intel_owl_db"
    # -- External database user
    user: "intelowl"
    # -- External database password
    password: ""
    # -- Use existing secret for database password (key: db-password)
    existingSecret: ""
    # -- SSL mode for PostgreSQL connection
    sslMode: "prefer"

# @section Broker parameters

broker:
  # -- Broker type: redis, rabbitmq, or sqs
  type: "redis"

  redis:
    # -- Use internal Redis subchart
    internal: true

    # External Redis configuration (used when internal is false)
    external:
      # -- External Redis host
      host: ""
      # -- External Redis port
      port: 6379
      # -- External Redis password
      password: ""
      # -- Use existing secret for Redis password (key: redis-password)
      existingSecret: ""
      # -- Redis database number
      db: 0

  rabbitmq:
    # -- Use internal RabbitMQ subchart
    internal: false

    # External RabbitMQ configuration (used when internal is false)
    external:
      # -- External RabbitMQ host
      host: ""
      # -- External RabbitMQ port
      port: 5672
      # -- External RabbitMQ user
      user: "guest"
      # -- External RabbitMQ password
      password: ""
      # -- External RabbitMQ virtual host
      vhost: "/"
      # -- Use existing secret for RabbitMQ password (key: rabbitmq-password)
      existingSecret: ""

  sqs:
    # -- AWS region for SQS
    region: ""
    # -- AWS access key ID
    accessKeyId: ""
    # -- AWS secret access key
    secretAccessKey: ""
    # -- Use existing secret for AWS credentials
    existingSecret: ""

# @section Storage parameters

storage:
  # -- Use local storage (PVCs). Set to false for cloud storage (S3)
  localStorage: true

  # Generic logs storage configuration
  genericLogs:
    # -- Storage size for generic logs
    size: "10Gi"
    # -- Access modes for generic logs PVC
    accessModes:
      - ReadWriteMany
    # -- Storage class for generic logs (uses global.storageClass if empty)
    storageClass: ""

  # Shared files storage configuration (analyzer results, uploads)
  sharedFiles:
    # -- Storage size for shared files
    size: "20Gi"
    # -- Access modes for shared files PVC
    accessModes:
      - ReadWriteMany
    # -- Storage class for shared files (uses global.storageClass if empty)
    storageClass: ""

  # Static content storage configuration (Django static files)
  staticContent:
    # -- Storage size for static content
    size: "5Gi"
    # -- Access modes for static content PVC
    accessModes:
      - ReadWriteMany
    # -- Storage class for static content (uses global.storageClass if empty)
    storageClass: ""

  # S3 configuration (when localStorage is false)
  s3:
    # -- Enable S3 storage
    enabled: false
    # -- S3 bucket name
    bucket: ""
    # -- AWS region
    region: ""
    # -- AWS access key ID
    accessKeyId: ""
    # -- AWS secret access key
    secretAccessKey: ""
    # -- Use existing secret for S3 credentials
    existingSecret: ""
    # -- S3 endpoint URL (for S3-compatible storage like MinIO)
    endpoint: ""

# @section uWSGI parameters
# Django application server configuration

uwsgi:
  # -- Number of uWSGI replicas
  replicaCount: 2

  image:
    # -- uWSGI image repository
    repository: intelowlproject/intelowl
    # -- uWSGI image tag (defaults to app.version)
    tag: ""
    # -- uWSGI image pull policy
    pullPolicy: IfNotPresent

  resources:
    requests:
      # -- Memory request for uWSGI
      memory: "1Gi"
      # -- CPU request for uWSGI
      cpu: "500m"
    limits:
      # -- Memory limit for uWSGI
      memory: "4Gi"
      # -- CPU limit for uWSGI
      cpu: "2"

  autoscaling:
    # -- Enable Horizontal Pod Autoscaler for uWSGI
    enabled: false
    # -- Minimum number of replicas
    minReplicas: 2
    # -- Maximum number of replicas
    maxReplicas: 10
    # -- Target CPU utilization percentage
    targetCPUUtilizationPercentage: 80
    # -- Target memory utilization percentage
    targetMemoryUtilizationPercentage: 80

  pdb:
    # -- Enable Pod Disruption Budget for uWSGI
    enabled: true
    # -- Minimum available pods
    minAvailable: 1

  # -- Node selector for uWSGI pods
  nodeSelector: {}
  # -- Tolerations for uWSGI pods
  tolerations: []
  # -- Affinity rules for uWSGI pods
  affinity: {}
  # -- Additional environment variables for uWSGI
  extraEnvVars: []
  # -- Additional volume mounts for uWSGI
  extraVolumeMounts: []
  # -- Additional volumes for uWSGI
  extraVolumes: []

  service:
    # -- uWSGI service type
    type: ClusterIP
    # -- uWSGI service port
    port: 8001

  startupProbe:
    # -- Enable startup probe
    enabled: true
    # -- Initial delay seconds
    initialDelaySeconds: 30
    # -- Period seconds
    periodSeconds: 10
    # -- Timeout seconds
    timeoutSeconds: 5
    # -- Failure threshold
    failureThreshold: 30
    # -- Success threshold
    successThreshold: 1

  livenessProbe:
    # -- Enable liveness probe
    enabled: true
    # -- Initial delay seconds
    initialDelaySeconds: 10
    # -- Period seconds
    periodSeconds: 10
    # -- Timeout seconds
    timeoutSeconds: 5
    # -- Failure threshold
    failureThreshold: 6
    # -- Success threshold
    successThreshold: 1

  readinessProbe:
    # -- Enable readiness probe
    enabled: true
    # -- Initial delay seconds
    initialDelaySeconds: 5
    # -- Period seconds
    periodSeconds: 10
    # -- Timeout seconds
    timeoutSeconds: 5
    # -- Failure threshold
    failureThreshold: 6
    # -- Success threshold
    successThreshold: 1

# @section Daphne parameters
# ASGI server for WebSockets

daphne:
  # -- Enable Daphne service
  enabled: true
  # -- Number of Daphne replicas
  replicaCount: 2

  image:
    # -- Daphne image repository
    repository: intelowlproject/intelowl
    # -- Daphne image tag (defaults to app.version)
    tag: ""
    # -- Daphne image pull policy
    pullPolicy: IfNotPresent

  resources:
    requests:
      # -- Memory request for Daphne
      memory: "512Mi"
      # -- CPU request for Daphne
      cpu: "250m"
    limits:
      # -- Memory limit for Daphne
      memory: "2Gi"
      # -- CPU limit for Daphne
      cpu: "1"

  pdb:
    # -- Enable Pod Disruption Budget for Daphne
    enabled: true
    # -- Minimum available pods
    minAvailable: 1

  # -- Node selector for Daphne pods
  nodeSelector: {}
  # -- Tolerations for Daphne pods
  tolerations: []
  # -- Affinity rules for Daphne pods
  affinity: {}
  # -- Additional environment variables for Daphne
  extraEnvVars: []
  # -- Additional volume mounts for Daphne
  extraVolumeMounts: []
  # -- Additional volumes for Daphne
  extraVolumes: []

  service:
    # -- Daphne service type
    type: ClusterIP
    # -- Daphne service port
    port: 8011

  startupProbe:
    # -- Enable startup probe
    enabled: true
    # -- Initial delay seconds
    initialDelaySeconds: 10
    # -- Period seconds
    periodSeconds: 5
    # -- Timeout seconds
    timeoutSeconds: 3
    # -- Failure threshold
    failureThreshold: 12
    # -- Success threshold
    successThreshold: 1

  livenessProbe:
    # -- Enable liveness probe
    enabled: true
    # -- Initial delay seconds
    initialDelaySeconds: 10
    # -- Period seconds
    periodSeconds: 10
    # -- Timeout seconds
    timeoutSeconds: 5
    # -- Failure threshold
    failureThreshold: 6
    # -- Success threshold
    successThreshold: 1

  readinessProbe:
    # -- Enable readiness probe
    enabled: true
    # -- Initial delay seconds
    initialDelaySeconds: 5
    # -- Period seconds
    periodSeconds: 10
    # -- Timeout seconds
    timeoutSeconds: 5
    # -- Failure threshold
    failureThreshold: 6
    # -- Success threshold
    successThreshold: 1

# @section Nginx parameters
# Reverse proxy configuration

nginx:
  # -- Number of Nginx replicas
  replicaCount: 2

  image:
    # -- Nginx image repository
    repository: intelowlproject/intelowl_nginx
    # -- Nginx image tag (defaults to app.version)
    tag: ""
    # -- Nginx image pull policy
    pullPolicy: IfNotPresent

  resources:
    requests:
      # -- Memory request for Nginx
      memory: "128Mi"
      # -- CPU request for Nginx
      cpu: "100m"
    limits:
      # -- Memory limit for Nginx
      memory: "512Mi"
      # -- CPU limit for Nginx
      cpu: "500m"

  pdb:
    # -- Enable Pod Disruption Budget for Nginx
    enabled: true
    # -- Minimum available pods
    minAvailable: 1

  # -- Node selector for Nginx pods
  nodeSelector: {}
  # -- Tolerations for Nginx pods
  tolerations: []
  # -- Affinity rules for Nginx pods
