      # -- Service port
      port: 4002
    resources:
      requests:
        # -- Memory request
        memory: "512Mi"
        # -- CPU request
        cpu: "250m"
      limits:
        # -- Memory limit
        memory: "2Gi"
        # -- CPU limit
        cpu: "1"

  # Tor Analyzers integration (Tor network analysis)
  torAnalyzers:
    # -- Enable Tor Analyzers integration
    enabled: false
    image:
      # -- Tor Analyzers image repository
      repository: intelowlproject/intelowl_tor_analyzers
      # -- Image tag (defaults to app.version)
      tag: ""
      # -- Image pull policy
      pullPolicy: IfNotPresent
    service:
      # -- Service port
      port: 4001
    resources:
      requests:
        # -- Memory request
        memory: "256Mi"
        # -- CPU request
        cpu: "100m"
      limits:
        # -- Memory limit
        memory: "1Gi"
        # -- CPU limit
        cpu: "500m"

# @section Networking parameters

networking:
  # -- Networking type: "gateway" (Gateway API) or "ingress" (traditional Ingress)
  type: "gateway"
  # -- Gateway API provider: nginx-gateway-fabric, envoy-gateway, istio, kong, traefik
  gatewayProvider: "nginx-gateway-fabric"

  # Gateway API configuration
  gateway:
    # -- Create Gateway resource
    create: true
    # -- Gateway name (auto-generated if empty)
    name: ""

    # GatewayClass configuration
    gatewayClass:
      # -- Create GatewayClass (usually created by the provider)
      create: false
      # -- GatewayClass name to use
      name: "nginx"

    # -- Gateway listeners configuration
    listeners:
      - name: http
        port: 80
        protocol: HTTP
        allowedRoutes:
          namespaces:
            from: Same
      # Uncomment for HTTPS:
      # - name: https
      #   port: 443
      #   protocol: HTTPS
      #   tls:
      #     mode: Terminate
      #     certificateRefs:
      #       - name: intelowl-tls
      #         kind: Secret

    # HTTPRoute configuration
    httpRoute:
      # -- Create HTTPRoute
      create: true
      # -- Hostnames for the route
      hostnames:
        - "intelowl.local"

      # WebSocket route configuration
      websocket:
        # -- Enable WebSocket route for Daphne
        enabled: true
        # -- WebSocket path prefix
        path: "/ws"

  # Traditional Ingress configuration (when type=ingress)
  ingress:
    # -- Enable Ingress
    enabled: false
    # -- Ingress class name
    className: "nginx"
    # -- Ingress annotations
    annotations: {}
      # nginx.ingress.kubernetes.io/proxy-body-size: "100m"
      # nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
      # nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
      # nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    # -- Ingress hosts configuration
    hosts:
      - host: intelowl.local
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration
    tls: []
      # - secretName: intelowl-tls
      #   hosts:
      #     - intelowl.local

# @section Network Policy parameters

networkPolicy:
  # -- Enable network policies
  enabled: false
  # -- Allow traffic from specific namespaces
  allowedNamespaces: []
  # -- Allow external egress (required for analyzers that need internet access)
  allowExternalEgress: true

# @section RBAC parameters

rbac:
  # -- Create ServiceAccount
  create: true
  # -- ServiceAccount name (auto-generated if empty)
  serviceAccountName: ""
  # -- Create Role and RoleBinding
  createRole: true
  # -- Annotations for ServiceAccount
  annotations: {}

# @section Security Context parameters

# -- Pod security context applied to all pods
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 33
  runAsGroup: 33
  fsGroup: 33

# -- Container security context applied to all containers
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# @section Migration parameters

migration:
  # -- Enable migration job as pre-install/pre-upgrade hook
  enabled: true
  # -- Migration timeout in seconds
  timeout: 600

  resources:
    requests:
      # -- Memory request for migration job
      memory: "512Mi"
      # -- CPU request for migration job
      cpu: "250m"
    limits:
      # -- Memory limit for migration job
      memory: "1Gi"
      # -- CPU limit for migration job
      cpu: "500m"

# @section External Secrets parameters

externalSecrets:
  # -- Enable External Secrets Operator integration
  enabled: false
  # -- Refresh interval for secrets
  refreshInterval: "1h"

  # Secret store reference
  secretStoreRef:
    # -- SecretStore name
    name: "cluster-secret-store"
    # -- SecretStore kind
    kind: "ClusterSecretStore"

  # Remote references for secrets
  remoteRefs:
    djangoSecret:
      # -- Remote key for Django secret
      key: "intelowl/secrets"
      # -- Property name in remote secret
      property: "DJANGO_SECRET"
    dbPassword:
      # -- Remote key for database password
      key: "intelowl/secrets"
      # -- Property name in remote secret
      property: "DB_PASSWORD"
    redisPassword:
      # -- Remote key for Redis password
      key: "intelowl/secrets"
      # -- Property name in remote secret
      property: "REDIS_PASSWORD"

# @section Metrics parameters

metrics:
  # -- Enable Prometheus metrics
  enabled: false

  # ServiceMonitor configuration
  serviceMonitor:
    # -- Enable ServiceMonitor for Prometheus Operator
    enabled: false
    # -- Scrape interval
    interval: "30s"
    # -- Scrape timeout
    scrapeTimeout: "10s"
    # -- Additional labels for ServiceMonitor
    labels: {}

  # PodMonitor configuration (for Celery workers)
  podMonitor:
    # -- Enable PodMonitor for Prometheus Operator
    enabled: false
    # -- Scrape interval
    interval: "30s"
    # -- Scrape timeout
    scrapeTimeout: "10s"
    # -- Additional labels for PodMonitor
    labels: {}

# @section Elasticsearch parameters (ECK)
# Requires ECK operator. See: https://www.elastic.co/guide/en/cloud-on-k8s/current/k8s-overview.html

elasticsearch:
  # -- Enable Elasticsearch for analysis results indexing
  enabled: false

  operator:
    # -- Install ECK operator via this chart (set to false if ECK operator is already installed)
    enabled: false

  # -- Elasticsearch version
  version: "8.19.14"
  # -- Number of Elasticsearch nodes
  replicas: 1
  # -- Allow mmap (set to true for production performance)
  allowMmap: false

  # -- Additional Elasticsearch configuration
  config: {}
    # xpack.security.enabled: true

  storage:
    # -- Storage size for Elasticsearch data
    size: "30Gi"
    # -- Storage class (uses global.storageClass if empty)
    storageClass: ""

  resources:
    requests:
      # -- Memory request for Elasticsearch
      memory: "2Gi"
      # -- CPU request for Elasticsearch
      cpu: "500m"
    limits:
      # -- Memory limit for Elasticsearch
      memory: "4Gi"
      # -- CPU limit for Elasticsearch
      cpu: "2"

  # Kibana dashboard configuration
  kibana:
    # -- Enable Kibana dashboard
    enabled: true
    # -- Number of Kibana replicas
    replicas: 1

    resources:
      requests:
        # -- Memory request for Kibana
        memory: "512Mi"
        # -- CPU request for Kibana
        cpu: "250m"
      limits:
        # -- Memory limit for Kibana
        memory: "1Gi"
        # -- CPU limit for Kibana
        cpu: "500m"

    # -- Node selector for Kibana pods
    nodeSelector: {}
    # -- Tolerations for Kibana pods
    tolerations: []

    # Ingress for Kibana dashboard
    ingress:
      # -- Enable Ingress for Kibana
      enabled: false
      # -- Ingress class name
      className: ""
      # -- Ingress annotations
      annotations: {}
      # -- Ingress hosts
      hosts:
        - host: kibana.intelowl.local
          paths:
            - path: /
              pathType: Prefix
      # -- TLS configuration
      tls: []

  # -- Node selector for Elasticsearch pods
  nodeSelector: {}
  # -- Tolerations for Elasticsearch pods
  tolerations: []
  # -- Affinity rules for Elasticsearch pods
  affinity: {}

# @section Superuser parameters
# Automatically create a Django superuser on first install

superuser:
  # -- Enable automatic superuser creation (post-install hook)
  enabled: false
  # -- Superuser username
  username: "admin"
  # -- Superuser email
  email: "admin@example.com"
  # -- Superuser password (auto-generated if empty)
  password: ""
  # -- Use existing secret for superuser password (key: superuser-password)
  existingSecret: ""

# @section Celery Restart parameters
# Weekly CronJob to restart Celery workers (prevents memory leaks)

celeryRestart:
  # -- Enable weekly Celery worker restart CronJob
  enabled: false
  # -- Cron schedule (default: every Sunday at 3:00 AM)
  schedule: "0 3 * * 0"

# @section Log Cleanup parameters
# CronJob for cleaning up old log files

logCleanup:
  # -- Enable log cleanup CronJob
  enabled: false
  # -- Cron schedule (default: every day at 2:00 AM)
  schedule: "0 2 * * *"
  # -- Number of days to retain log files
  retentionDays: 30

# @section PostgreSQL parameters (CloudNative-PG)
# Requires CloudNative-PG operator. See: https://cloudnative-pg.io/

postgresql:
  # -- Enable PostgreSQL (creates CNPG Cluster resource)
  enabled: true

  operator:
    # -- Install CloudNative-PG operator via this chart (set to true only if not already installed)
    enabled: false

  # -- Number of PostgreSQL instances (1 for dev, 3 for HA)
  instances: 1

  image:
    # -- PostgreSQL image repository
    repository: ghcr.io/cloudnative-pg/postgresql
    # -- PostgreSQL version tag
    tag: "16"
    # -- Image pull policy
    pullPolicy: IfNotPresent

  # -- Database name
  database: "intel_owl_db"
  # -- Database username
  username: "intelowl"
  # -- Database password (auto-generated if empty)
  password: ""
  # -- Use existing secret for credentials
  existingSecret: ""

  storage:
    # -- Storage size for PostgreSQL data
    size: "10Gi"
    # -- Storage class (uses global.storageClass if empty)
    storageClass: ""

  walStorage:
    # -- Enable separate WAL storage
    enabled: false
    # -- WAL storage size
    size: "2Gi"
    # -- WAL storage class
    storageClass: ""

  # -- PostgreSQL server parameters
  parameters: {}
    # max_connections: "200"
    # shared_buffers: "256MB"

  initdb:
    # -- Post-init SQL statements
    postInitSQL: []

  synchronous:
    # -- Enable synchronous replication (requires instances > 1)
    enabled: false
    # -- Minimum synchronous replicas
    minSyncReplicas: 1
    # -- Maximum synchronous replicas
    maxSyncReplicas: 2

  backup:
    # -- Enable backup to S3-compatible storage
    enabled: false
    # -- S3 destination path
    destinationPath: ""
    # -- S3 endpoint URL
    endpointURL: ""
    # -- Backup retention policy
    retentionPolicy: "30d"
    s3Credentials:
      # -- Secret name containing S3 credentials
      secretName: ""
      # -- Key for access key ID
      accessKeyIdKey: "ACCESS_KEY_ID"
      # -- Key for secret access key
      secretAccessKeyKey: "ACCESS_SECRET_KEY"

  monitoring:
    # -- Enable PostgreSQL monitoring
    enabled: false
    # -- Enable PodMonitor for PostgreSQL
    podMonitor: false

  resources:
    requests:
      # -- Memory request for PostgreSQL
      memory: "256Mi"
      # -- CPU request for PostgreSQL
      cpu: "100m"
    limits:
      # -- Memory limit for PostgreSQL
      memory: "1Gi"
      # -- CPU limit for PostgreSQL
      cpu: "500m"

  # -- Node selector for PostgreSQL pods
  nodeSelector: {}
  # -- Tolerations for PostgreSQL pods
  tolerations: []
  # -- Affinity rules for PostgreSQL pods
  affinity: {}

# @section Redis parameters (CloudPirates)
# See: https://github.com/cloudpirates/helm-charts

redis:
  # -- Enable Redis subchart
  enabled: true
  # -- Redis architecture: standalone or replication
  architecture: standalone

  auth:
    # -- Enable Redis authentication
    enabled: true
    # -- Redis password (auto-generated if empty)
    password: ""
    # -- Use existing secret for password
    existingSecret: ""
    # -- Key in existingSecret containing the password
    existingSecretPasswordKey: "redis-password"

  persistence:
    # -- Enable Redis persistence
    enabled: true
    # -- Persistence storage size
    size: "5Gi"
    # -- Storage class
    storageClass: ""

  sentinel:
    # -- Enable Sentinel for HA (requires architecture: replication)
    enabled: false
    # -- Sentinel quorum
    quorum: 2

  resources:
    requests:
      # -- Memory request for Redis
      memory: "128Mi"
      # -- CPU request for Redis
      cpu: "100m"
    limits:
      # -- Memory limit for Redis
      memory: "512Mi"
      # -- CPU limit for Redis
      cpu: "500m"

  # -- Node selector for Redis pods
  nodeSelector: {}
  # -- Tolerations for Redis pods
  tolerations: []
  # -- Affinity rules for Redis pods
  affinity: {}

# @section RabbitMQ parameters (CloudPirates)
# Enable when broker.type=rabbitmq and broker.rabbitmq.internal=true
# See: https://github.com/cloudpirates/helm-charts

rabbitmq:
  # -- Enable RabbitMQ subchart
  enabled: false

  auth:
    # -- RabbitMQ username
    username: "intelowl"
    # -- RabbitMQ password (auto-generated if empty)
    password: ""
    # -- Use existing secret for credentials
    existingSecret: ""
    # -- Key in existingSecret containing the password (CloudPirates chart uses "password")
    existingSecretPasswordKey: "password"

  # -- RabbitMQ virtual host
  vhost: "/"

  persistence:
    # -- Enable RabbitMQ persistence
    enabled: true
    # -- Persistence storage size
    size: "5Gi"
    # -- Storage class
    storageClass: ""

  resources:
    requests:
      # -- Memory request for RabbitMQ
      memory: "256Mi"
      # -- CPU request for RabbitMQ
      cpu: "100m"
    limits:
      # -- Memory limit for RabbitMQ
      memory: "1Gi"
      # -- CPU limit for RabbitMQ
      cpu: "500m"

  management:
    # -- Enable RabbitMQ management plugin
    enabled: true

  # -- Node selector for RabbitMQ pods
  nodeSelector: {}
  # -- Tolerations for RabbitMQ pods
  tolerations: []
  # -- Affinity rules for RabbitMQ pods
  affinity: {}
