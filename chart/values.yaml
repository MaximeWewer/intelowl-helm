        # -- Memory request
        memory: "256Mi"
        # -- CPU request
        cpu: "100m"
      limits:
        # -- Memory limit
        memory: "1Gi"
        # -- CPU limit
        cpu: "500m"

  # PCAP Analyzers integration (Suricata, network analysis)
  pcapAnalyzers:
    # -- Enable PCAP Analyzers integration
    enabled: false
    image:
      # -- PCAP Analyzers image repository
      repository: intelowlproject/intelowl_pcap_analyzers
      # -- Image tag (defaults to app.version)
      tag: ""
      # -- Image pull policy
      pullPolicy: IfNotPresent
    service:
      # -- Service port
      port: 4004
    resources:
      requests:
        # -- Memory request
        memory: "512Mi"
        # -- CPU request
        cpu: "250m"
      limits:
        # -- Memory limit
        memory: "2Gi"
        # -- CPU limit
        cpu: "1"

  # BBOT integration (OSINT automation)
  bbot:
    # -- Enable BBOT integration
    enabled: false
    image:
      # -- BBOT image repository
      repository: intelowlproject/intelowl_bbot_analyzer
      # -- Image tag (defaults to app.version)
      tag: ""
      # -- Image pull policy
      pullPolicy: IfNotPresent
