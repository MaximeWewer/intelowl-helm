# Production IntelOwl deployment
# High availability configuration suitable for production environments.
#
# Features:
# - HA PostgreSQL (3 instances, synchronous replication)
# - Multiple replicas for all core services
# - Pod Disruption Budgets enabled
# - Horizontal Pod Autoscaling
# - Multi-queue Celery workers
# - Prometheus metrics enabled
# - TLS termination
# - Automatic superuser creation
# - Celery worker restart CronJob
# - Log cleanup CronJob
# - Network policies
#
# Prerequisites:
# - Gateway API CRDs installed and a gateway controller (e.g. nginx-gateway-fabric)
# - StorageClass with ReadWriteMany support (set per component below)
# - TLS certificate secret already created in the target namespace
# - CloudNative-PG: deployed by this chart (operator.enabled=true) or
#   pre-installed cluster-wide.
#
# Install (plain helm, operator preinstalled):
#   cd chart
#   helm install intelowl . -f examples/production.yaml -n intelowl --create-namespace
#
# ArgoCD: drop this content into spec.source.helm.values and pin
#   spec.source.targetRevision to a dated tag (e.g. 6.6.1-DD-MM-YYYY).
#
# IMPORTANT for ArgoCD: ALWAYS set explicit values for the random fields
# below (django.secretKey, postgresql.password, redis.auth.password,
# superuser.password). Helm `lookup` does not work under ArgoCD, so any
# `randAlphaNum` fallback regenerates on every sync and causes drift.

app:
  django:
    # CRITICAL: Generate a unique secret key for production
    # python3 -c "import secrets, string; print(''.join(secrets.choice(string.ascii_letters+string.digits) for _ in range(50)))"
    secretKey: ""              # MUST be set explicitly
    existingSecret: ""         # Or reference a pre-created Secret
    debug: false
    allowedHosts: "intelowl.example.com"
  baseUrl: "https://intelowl.example.com"
  logLevel: "INFO"
  defaultTimeout: 300
  oldJobsRetentionDays: 14
  httpsEnabled: true

  # Slack notifications (optional)
  # slack:
  #   enabled: true
  #   token: ""
  #   defaultChannel: "#intelowl-alerts"

  # Email notifications (optional)
  # email:
  #   enabled: true
  #   host: "smtp.example.com"
  #   port: 587
  #   hostUser: "alerts@example.com"
  #   hostPassword: ""
  #   defaultFromEmail: "intelowl@example.com"
  #   defaultEmail: "admin@example.com"
  #   useTls: true

# uWSGI with autoscaling
uwsgi:
  replicaCount: 3
  resources:
    requests:
      memory: "2Gi"
      cpu: "1"
    limits:
      memory: "8Gi"
      cpu: "4"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: true
    minAvailable: 2

# Daphne for WebSockets
daphne:
  enabled: true
  replicaCount: 3
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1"
  pdb:
    enabled: true
    minAvailable: 2

# Nginx reverse proxy
nginx:
  replicaCount: 3
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1"
  pdb:
    enabled: true
    minAvailable: 2

# Default Celery workers with autoscaling
celeryWorkerDefault:
  replicaCount: 3
  concurrency: 4
  terminationGracePeriodSeconds: 300
  resources:
    requests:
      memory: "2Gi"
      cpu: "1"
    limits:
      memory: "8Gi"
      cpu: "4"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 2

# Multi-queue Celery workers for better resource isolation
multiQueue:
  enabled: true
  workerLocal:
    enabled: true
    replicaCount: 2
    concurrency: 2
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "2"
  workerLong:
    enabled: true
    replicaCount: 2
    concurrency: 2
    terminationGracePeriodSeconds: 600
    resources:
      requests:
        memory: "2Gi"
        cpu: "1"
      limits:
        memory: "8Gi"
        cpu: "4"
  workerIngestor:
    enabled: false

# HA PostgreSQL with 3 instances. operator.enabled deploys CNPG via the
# subchart in the right sync wave; set to false if CNPG is pre-installed.
postgresql:
  enabled: true
  operator:
    enabled: true
  instances: 3
  password: ""              # MUST be set explicitly for ArgoCD stability
  storage:
    size: "50Gi"
    storageClass: ""        # set to a RWO-capable class
  walStorage:
    enabled: true
    size: "10Gi"
    storageClass: ""
  synchronous:
    enabled: true
    minSyncReplicas: 1
    maxSyncReplicas: 2
  resources:
    requests:
      memory: "2Gi"
      cpu: "1"
    limits:
      memory: "8Gi"
      cpu: "4"

# Redis: keep architecture=standalone. The chart points the broker URL at
# the headless service which does not honour Sentinel master discovery,
# so replication+sentinel breaks Celery (writes hit a replica → READONLY).
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: ""            # MUST be set explicitly for ArgoCD stability
  persistence:
    size: "10Gi"
    storageClass: ""        # subchart does NOT read any chart-global value

# Production storage sizes — set storageClass per component (RWX-capable
# for the shared ones; the chart does not expose a global storageClass).
storage:
  genericLogs:
    size: "50Gi"
    storageClass: ""        # ReadWriteMany
  sharedFiles:
    size: "100Gi"
    storageClass: ""        # ReadWriteMany
  staticContent:
    size: "10Gi"
    storageClass: ""        # ReadWriteMany

# Gateway API with TLS
networking:
  type: "gateway"
  gatewayProvider: "nginx-gateway-fabric"
  gateway:
    create: true
    gatewayClass:
      name: "nginx"
    listeners:
      - name: http
        port: 80
        protocol: HTTP
        allowedRoutes:
          namespaces:
            from: Same
      - name: https
        port: 443
        protocol: HTTPS
        tls:
          mode: Terminate
          certificateRefs:
            - name: intelowl-tls
              kind: Secret
        allowedRoutes:
          namespaces:
            from: Same
    httpRoute:
      hostnames:
        - "intelowl.example.com"
      websocket:
        enabled: true

# Flower dashboard with authentication
flower:
  enabled: true
  auth:
    enabled: true
    username: "admin"
    password: ""              # MUST be set explicitly
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Prometheus metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: "30s"
    labels:
      release: prometheus
  podMonitor:
    enabled: true
    interval: "30s"
    labels:
      release: prometheus

# Network policies for security
networkPolicy:
  enabled: true
  allowExternalEgress: true

# Automatic superuser creation
superuser:
  enabled: true
  username: "admin"
  email: "admin@example.com"
  password: ""                # MUST be set explicitly for ArgoCD stability

# Weekly Celery worker restart (prevents memory leaks)
celeryRestart:
  enabled: true
  schedule: "0 3 * * 0"       # Every Sunday at 3:00 AM

# Log cleanup
logCleanup:
  enabled: true
  schedule: "0 2 * * *"       # Every day at 2:00 AM
  retentionDays: 30
