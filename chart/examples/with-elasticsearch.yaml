# IntelOwl with Elasticsearch and Kibana
# Enables analysis results indexing and visualization
#
# Prerequisites:
# - Gateway API CRDs installed
# - CloudNative-PG: deployed by this chart (postgresql.operator.enabled=true)
#   or pre-installed cluster-wide
# - ECK: deployed by this chart (elasticsearch.operator.enabled=true) or
#   pre-installed cluster-wide:
#     helm repo add elastic https://helm.elastic.co
#     helm install elastic-operator elastic/eck-operator -n elastic-system --create-namespace
#
# Install (plain helm, operators preinstalled):
#   cd chart
#   helm install intelowl . -f examples/with-elasticsearch.yaml -n intelowl --create-namespace
#
# Access Kibana:
#   kubectl port-forward svc/intelowl-kibana-kb-http 5601:5601 -n intelowl
#   Open http://localhost:5601 (chart disables ECK self-signed TLS)
#   Username: elastic
#   Password: kubectl get secret intelowl-es-elastic-user -n intelowl -o jsonpath='{.data.elastic}' | base64 -d

app:
  django:
    secretKey: "your-secret-key-change-me"
    debug: false

# Standard service configuration
uwsgi:
  replicaCount: 2

daphne:
  enabled: true
  replicaCount: 2

nginx:
  replicaCount: 2

celeryWorkerDefault:
  replicaCount: 2
  concurrency: 4

# Database
postgresql:
  enabled: true
  operator:
    enabled: true
  instances: 1
  password: ""
  storage:
    size: "10Gi"
    storageClass: ""

# Standalone Redis (replication+sentinel breaks the chart's broker wiring)
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: ""
  persistence:
    size: "5Gi"
    storageClass: ""

# Storage
storage:
  genericLogs:
    size: "10Gi"
    storageClass: ""
  sharedFiles:
    size: "20Gi"
    storageClass: ""
  staticContent:
    size: "5Gi"
    storageClass: ""

# Gateway API networking
networking:
  type: "gateway"
  gateway:
    create: true
    gatewayClass:
      name: "nginx"
    httpRoute:
      hostnames:
        - "intelowl.local"

# =====================================
# Elasticsearch + Kibana (ECK)
# =====================================

elasticsearch:
  enabled: true
  operator:
    enabled: true
  # Use >=2 nodes so the IntelOwl `plugin-report-*` indices (1 replica)
  # keep replica shards assignable and the cluster stays green. A single
  # node leaves them UNASSIGNED (yellow) and blocks ArgoCD health checks.
  replicas: 2

  # Requires vm.max_map_count=262144 on every node, otherwise ES crashes
  # at boot with "max virtual memory areas vm.max_map_count [65530] is too low"
  allowMmap: true

  # Additional Elasticsearch configuration
  # config:
  #   xpack.security.enabled: true

  storage:
    size: "30Gi"
    storageClass: ""

  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2"

  # Kibana dashboard
  kibana:
    enabled: true
    replicas: 1
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"

    # Enable Kibana Ingress (optional)
    # ingress:
    #   enabled: true
    #   className: "nginx"
    #   hosts:
    #     - host: kibana.intelowl.local
    #       paths:
    #         - path: /
    #           pathType: Prefix
    #   tls:
    #     - secretName: kibana-tls
    #       hosts:
    #         - kibana.intelowl.local

# Monitoring
flower:
  enabled: false
