# Minimal IntelOwl deployment for testing
# Simplest configuration to get IntelOwl running.
#
# Prerequisites:
# - StorageClass available on the cluster (set storage.*.storageClass below)
# - Gateway API CRDs installed (or switch networking.type=ingress)
# - CloudNative-PG operator: deployed by this chart via the subchart
#   (postgresql.operator.enabled=true) or pre-installed cluster-wide.
#
# Install (plain helm, operator preinstalled):
#   cd chart
#   helm install intelowl . -f examples/minimal.yaml -n intelowl --create-namespace
#
# ArgoCD: point the Application at the OCI chart and paste this content
# under spec.source.helm.values. Keep postgresql.operator.enabled=true so
# the CNPG subchart deploys in the right sync wave.
#
# Access:
#   kubectl port-forward svc/intelowl-nginx 8080:80 -n intelowl
#   Open http://localhost:8080

app:
  django:
    # IMPORTANT: Generate a real secret key for any non-test deployment
    # python3 -c "import secrets, string; print(''.join(secrets.choice(string.ascii_letters+string.digits) for _ in range(50)))"
    secretKey: "test-secret-key-change-me-in-production"
    debug: false

# Single replica for minimal resource usage
uwsgi:
  replicaCount: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1"
  pdb:
    enabled: false

daphne:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  pdb:
    enabled: false

nginx:
  replicaCount: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  pdb:
    enabled: false

celeryWorkerDefault:
  replicaCount: 1
  concurrency: 2
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1"
  pdb:
    enabled: false

celeryBeat:
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"

# Single PostgreSQL instance.
# operator.enabled=true deploys CNPG as subchart (recommended for ArgoCD /
# fresh clusters). Set to false if operator is pre-installed cluster-wide.
postgresql:
  enabled: true
  operator:
    enabled: true
  instances: 1
  password: ""              # Set explicitly to avoid Argo render-drift
  storage:
    size: "5Gi"
    storageClass: ""        # e.g. "standard", "nfs", "gp3"
  walStorage:
    enabled: false

# Standalone Redis. replication+sentinel break Celery — the chart does
# not point to the master-only service when sentinel is on. Keep standalone.
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: ""            # Set explicitly to avoid Argo render-drift
  persistence:
    size: "2Gi"
    storageClass: ""        # subchart does NOT read any chart-global storageClass

# Smaller PVCs for testing
storage:
  genericLogs:
    size: "2Gi"
    storageClass: ""
  sharedFiles:
    size: "5Gi"
    storageClass: ""
  staticContent:
    size: "1Gi"
    storageClass: ""

# Use Gateway API (default)
networking:
  type: "gateway"
  gateway:
    create: true
    gatewayClass:
      name: "nginx"
    httpRoute:
      hostnames:
        - "intelowl.local"

# Disable monitoring for minimal setup
flower:
  enabled: false

metrics:
  enabled: false

# Automatic superuser creation (optional, convenient for quick testing)
# superuser:
#   enabled: true
#   username: "admin"
#   email: "admin@test.local"
#   password: "changeme"
