# Development IntelOwl deployment
# Suitable for development and testing environments
#
# Features:
# - 2 replicas for core services
# - Debug mode enabled
# - Flower dashboard enabled
# - Gateway API networking
# - Automatic superuser creation (admin/admin)
#
# Prerequisites:
# - Gateway API CRDs installed
# - CloudNative-PG: deployed by this chart (operator.enabled=true) or
#   pre-installed cluster-wide.
#
# Install (plain helm, operator preinstalled):
#   cd chart
#   helm install intelowl . -f examples/development.yaml -n intelowl --create-namespace
#
# Access:
#   kubectl port-forward svc/intelowl-nginx 8080:80 -n intelowl
#   kubectl port-forward svc/intelowl-flower 5555:5555 -n intelowl
#   Open http://localhost:8080

app:
  django:
    # IMPORTANT: Generate a real secret key
    secretKey: "development-secret-key-change-in-production"
    debug: true
    allowedHosts: "*"
  logLevel: "DEBUG"
  oldJobsRetentionDays: 7

# Core services with 2 replicas
uwsgi:
  replicaCount: 2
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2"

daphne:
  enabled: true
  replicaCount: 2
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1"

nginx:
  replicaCount: 2
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

celeryWorkerDefault:
  replicaCount: 2
  concurrency: 4
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "2"

# Single PostgreSQL instance for development
postgresql:
  enabled: true
  operator:
    enabled: true
  instances: 1
  password: ""              # Set explicitly for ArgoCD stability
  storage:
    size: "10Gi"
    storageClass: ""

# Standalone Redis (replication+sentinel breaks the chart's broker wiring)
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: ""            # Set explicitly for ArgoCD stability
  persistence:
    size: "5Gi"
    storageClass: ""        # subchart does NOT read any chart-global value

# Standard storage sizes
storage:
  genericLogs:
    size: "10Gi"
    storageClass: ""
  sharedFiles:
    size: "20Gi"
    storageClass: ""
  staticContent:
    size: "5Gi"
    storageClass: ""

# Gateway API networking
networking:
  type: "gateway"
  gateway:
    create: true
    gatewayClass:
      name: "nginx"
    httpRoute:
      hostnames:
        - "intelowl.local"
      websocket:
        enabled: true

# Enable Flower dashboard for monitoring
flower:
  enabled: true
  auth:
    enabled: false
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Prometheus metrics disabled
metrics:
  enabled: false

# Automatic superuser creation for development
superuser:
  enabled: true
  username: "admin"
  email: "admin@dev.local"
  password: "admin" # Acceptable for development only
