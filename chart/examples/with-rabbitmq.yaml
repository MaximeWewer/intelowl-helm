# IntelOwl with RabbitMQ as message broker (instead of Redis)
# Use this if you prefer RabbitMQ for Celery task queues
#
# Prerequisites:
# - Gateway API CRDs installed
# - CloudNative-PG: deployed by this chart (postgresql.operator.enabled=true)
#   or pre-installed cluster-wide
#
# Install (plain helm, operator preinstalled):
#   cd chart
#   helm install intelowl . -f examples/with-rabbitmq.yaml -n intelowl --create-namespace

app:
  django:
    secretKey: "your-secret-key-change-me"
    debug: false

# Standard service configuration
uwsgi:
  replicaCount: 2

daphne:
  enabled: true
  replicaCount: 2

nginx:
  replicaCount: 2

celeryWorkerDefault:
  replicaCount: 2
  concurrency: 4

# Database
postgresql:
  enabled: true
  operator:
    enabled: true
  instances: 1
  password: ""
  storage:
    size: "10Gi"
    storageClass: ""

# Message broker configuration
broker:
  # Use RabbitMQ instead of Redis
  type: "rabbitmq"

  # Disable internal Redis (still need it for caching/websockets)
  redis:
    internal: true # Redis is still used for result backend and websockets

  # Use internal RabbitMQ
  rabbitmq:
    internal: true

# Redis (still needed for result backend and websockets)
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: ""
  persistence:
    size: "5Gi"
    storageClass: ""

# RabbitMQ configuration
rabbitmq:
  enabled: true
  auth:
    username: "intelowl"
    password: ""              # Set explicitly for ArgoCD stability
  vhost: "/"
  persistence:
    size: "5Gi"
    storageClass: ""          # subchart does NOT read any chart-global value
  management:
    enabled: true
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# Storage
storage:
  genericLogs:
    size: "10Gi"
    storageClass: ""
  sharedFiles:
    size: "20Gi"
    storageClass: ""
  staticContent:
    size: "5Gi"
    storageClass: ""

# Gateway API networking
networking:
  type: "gateway"
  gateway:
    create: true
    gatewayClass:
      name: "nginx"
    httpRoute:
      hostnames:
        - "intelowl.local"
