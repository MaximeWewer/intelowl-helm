name: Update Versions

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  update-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4 | bash

      - name: Get latest IntelOwl release
        id: intelowl
        run: |
          LATEST=$(curl -s https://api.github.com/repos/intelowlproject/IntelOwl/releases/latest | jq -r '.tag_name')
          echo "version=${LATEST}" >> $GITHUB_OUTPUT
          echo "IntelOwl latest: ${LATEST}"

      - name: Get latest Elasticsearch 8.x release
        id: elasticsearch
        run: |
          # Get the latest 8.x release (skip 9.x and pre-releases)
          LATEST=$(curl -s https://api.github.com/repos/elastic/elasticsearch/releases?per_page=50 | \
            jq -r '[.[] | select(.prerelease == false and (.tag_name | startswith("v8.")))][0].tag_name // empty')
          # Strip leading 'v' if present
          LATEST="${LATEST#v}"
          echo "version=${LATEST}" >> $GITHUB_OUTPUT
          echo "Elasticsearch 8.x latest: ${LATEST}"

      - name: Get latest dependency chart versions
        id: deps
        run: |
          # CloudNative-PG
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo update cnpg
          CNPG_VERSION=$(helm search repo cnpg/cloudnative-pg --output json | jq -r '.[0].version')
          CNPG_MAJOR_MINOR=$(echo "$CNPG_VERSION" | sed 's/\.[0-9]*$/.*/')
          echo "cnpg=${CNPG_MAJOR_MINOR}" >> $GITHUB_OUTPUT
          echo "CloudNative-PG latest: ${CNPG_VERSION} -> pattern ${CNPG_MAJOR_MINOR}"

          # ECK Operator
          helm repo add elastic https://helm.elastic.co
          helm repo update elastic
          ECK_VERSION=$(helm search repo elastic/eck-operator --output json | jq -r '.[0].version')
          ECK_MAJOR_MINOR=$(echo "$ECK_VERSION" | sed 's/\.[0-9]*$/.*/')
          echo "eck=${ECK_MAJOR_MINOR}" >> $GITHUB_OUTPUT
          echo "ECK Operator latest: ${ECK_VERSION} -> pattern ${ECK_MAJOR_MINOR}"

          # CloudPirates Redis (OCI)
          REDIS_TAGS=$(curl -s "https://registry-1.docker.io/v2/cloudpirates/redis/tags/list" 2>/dev/null || true)
          if [ -z "$REDIS_TAGS" ] || echo "$REDIS_TAGS" | jq -e '.errors' > /dev/null 2>&1; then
            # Fallback: use skopeo or helm to find latest tag
            REDIS_VERSION=$(helm show chart oci://registry-1.docker.io/cloudpirates/redis 2>/dev/null | grep '^version:' | awk '{print $2}' || true)
          else
            REDIS_VERSION=$(echo "$REDIS_TAGS" | jq -r '.tags | map(select(test("^[0-9]"))) | sort_by(split(".") | map(tonumber)) | last')
          fi
          if [ -n "$REDIS_VERSION" ]; then
            REDIS_MAJOR_MINOR=$(echo "$REDIS_VERSION" | sed 's/\.[0-9]*$/.*/')
            echo "redis=${REDIS_MAJOR_MINOR}" >> $GITHUB_OUTPUT
            echo "Redis latest: ${REDIS_VERSION} -> pattern ${REDIS_MAJOR_MINOR}"
          else
            echo "redis=" >> $GITHUB_OUTPUT
            echo "Could not determine Redis version, skipping"
          fi

          # CloudPirates RabbitMQ (OCI)
          RABBITMQ_VERSION=$(helm show chart oci://registry-1.docker.io/cloudpirates/rabbitmq 2>/dev/null | grep '^version:' | awk '{print $2}' || true)
          if [ -n "$RABBITMQ_VERSION" ]; then
            RABBITMQ_MAJOR_MINOR=$(echo "$RABBITMQ_VERSION" | sed 's/\.[0-9]*$/.*/')
            echo "rabbitmq=${RABBITMQ_MAJOR_MINOR}" >> $GITHUB_OUTPUT
            echo "RabbitMQ latest: ${RABBITMQ_VERSION} -> pattern ${RABBITMQ_MAJOR_MINOR}"
          else
            echo "rabbitmq=" >> $GITHUB_OUTPUT
            echo "Could not determine RabbitMQ version, skipping"
          fi

      - name: Update Chart.yaml
        run: |
          INTELOWL="${{ steps.intelowl.outputs.version }}"
          CNPG="${{ steps.deps.outputs.cnpg }}"
          ECK="${{ steps.deps.outputs.eck }}"
          REDIS="${{ steps.deps.outputs.redis }}"
          RABBITMQ="${{ steps.deps.outputs.rabbitmq }}"

          # Update appVersion
          sed -i "s/^appVersion: .*/appVersion: \"${INTELOWL}\"/" chart/Chart.yaml

          # Update dependency versions
          if [ -n "$CNPG" ]; then
            sed -i "/name: cloudnative-pg/{n;s/version: .*/version: \"${CNPG}\"/}" chart/Chart.yaml
          fi
          if [ -n "$ECK" ]; then
            sed -i "/name: eck-operator/{n;s/version: .*/version: \"${ECK}\"/}" chart/Chart.yaml
          fi
          if [ -n "$REDIS" ]; then
            sed -i "/name: redis/{n;s/version: .*/version: \"${REDIS}\"/}" chart/Chart.yaml
          fi
          if [ -n "$RABBITMQ" ]; then
            sed -i "/name: rabbitmq/{n;s/version: .*/version: \"${RABBITMQ}\"/}" chart/Chart.yaml
          fi

      - name: Update values.yaml
        run: |
          INTELOWL="${{ steps.intelowl.outputs.version }}"
          ES="${{ steps.elasticsearch.outputs.version }}"

          # Update app.version
          sed -i "s/^\(  version: \)\"v[0-9.]*\"/\1\"${INTELOWL}\"/" chart/values.yaml

          # Update elasticsearch.version
          if [ -n "$ES" ]; then
            sed -i "/^  # -- Elasticsearch version/{n;s/version: .*/version: \"${ES}\"/}" chart/values.yaml
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Align chart version with IntelOwl
        if: steps.changes.outputs.changed == 'true'
        id: bump
        run: |
          # Strip leading 'v' from IntelOwl version to get semver
          NEW_VERSION="${{ steps.intelowl.outputs.version }}"
          NEW_VERSION="${NEW_VERSION#v}"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" chart/Chart.yaml
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Chart version set to: ${NEW_VERSION}"

      - name: Update README.md
        if: steps.changes.outputs.changed == 'true'
        run: |
          INTELOWL="${{ steps.intelowl.outputs.version }}"
          CHART_VERSION="${{ steps.bump.outputs.version }}"

          # Chart README badges
          sed -i "s|AppVersion-[^-]*-informational|AppVersion-${INTELOWL}-informational|" chart/README.md
          sed -i "s|Version-[^-]*-informational|Version-${CHART_VERSION}-informational|" chart/README.md

          # Root README — bump targetRevision used in the Argo CD example
          sed -i "s|targetRevision: \"[^\"]*\"|targetRevision: \"${CHART_VERSION}\"|" README.md

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update versions to IntelOwl ${{ steps.intelowl.outputs.version }}"
          title: "chore: update versions to IntelOwl ${{ steps.intelowl.outputs.version }}"
          body: |
            ## Automated version update

            | Component | Version |
            |-----------|---------|
            | IntelOwl | `${{ steps.intelowl.outputs.version }}` |
            | Elasticsearch | `${{ steps.elasticsearch.outputs.version }}` |
            | Chart version | `${{ steps.bump.outputs.version }}` |

            ### Dependency chart updates
            | Dependency | Version pattern |
            |-----------|----------------|
            | cloudnative-pg | `${{ steps.deps.outputs.cnpg }}` |
            | eck-operator | `${{ steps.deps.outputs.eck }}` |
            | redis | `${{ steps.deps.outputs.redis }}` |
            | rabbitmq | `${{ steps.deps.outputs.rabbitmq }}` |
          branch: chore/update-versions
          delete-branch: true
